!WOS system config file----------------------------------------
!system name:OLT-FIBERHOME-LAB
cli debug off
idle-timeout 0
terminal length 512
set new cmd enable
!module config:CardAuth.
set card_auth slot 1 type gc8b
set card_auth slot 2 type gc8b
set card_auth slot 19 type hu1a
set card_auth slot 20 type hu1a
!module config:br_cli_snmp.
set uplink slot 19 port 1 enable
set uplink slot 19 port 1 Interface serdes
set uplink slot 20 port 1 enable
set uplink slot 20 port 1 Interface serdes
set manage_vlan 4000 GERENCIA
set manage vlan name GERENCIA ip 10.16.39.2/24
add static route destination 0.0.0.0 gateway 10.16.39.1 mask 0.0.0.0
add vlan vlan_begin 100 vlan_end 100 tag uplink slot 19 port 1
add vlan vlan_begin 100 vlan_end 100 tag allslot 0
add vlan vlan_begin 200 vlan_end 200 tag uplink slot 19 port 1
add vlan vlan_begin 200 vlan_end 200 tag allslot 0
create service_vlan 101
set service_vlan 101 CLIENTES type data
set service_vlan 101 vlan_begin 100 vlan_end 100
create service_vlan 102
set service_vlan 102 IPTV type iptv
set service_vlan 102 vlan_begin 200 vlan_end 200
!module config:capability_set.
add cs onu profile name HG6145D2 onutype 10000 pontype 712 onucapa 0 lan1g 4 lan10g 0 pots 1
add cs onu profile option wifi 2 end
add cs onu profile name HG6145F3 onutype 10001 pontype 712 onucapa 0 lan1g 4 lan10g 0 pots 1
add cs onu profile option eid HG6145F3 end
!module config:onu_auth.
set white phy addr FHTT11111111 pas null ac add sl 1 p 1 o 1 ty HG6145D2
set white phy addr FHTT22222222 pas null ac add sl 1 p 1 o 2 ty HG6145D2
set white phy addr FHTT33333333 pas fiberhome ac add sl 1 p 2 o 1 ty HG6145F3
