[!Software Version MA5800V100R021C10]
#
[global-config]
  <global-config>
 sysname OLT-HUAWEI-LAB
 system modify logon password disable
 traffic table ip index 8 name "SMARTOLT-1G-UP" cir 1048064 cbs 33540048 pir 1048064 pbs 33540048 color-mode color-blind priority 0 inner-priority 0 priority-policy local-setting
 dba-profile add profile-id 10 profile-name "DBA-DADOS" type4 max 1024000
 dba-profile add profile-id 11 profile-name "DBA-VOZ" type4 max 512000
 ont-srvprofile gpon profile-id 1 profile-name "Generic_1_V100"
  ont-port pots adaptive 32 eth adaptive 8 catv adaptive 8
  port vlan eth 1 translation 100 user-vlan 100
  commit
 ont-lineprofile gpon profile-id 10 profile-name "LP-DADOS"
  commit
#
[vlan]
  <vlan>
 vlan 100 smart
 vlan 200 smart
 vlan 300 smart
#
[uplinks]
  <uplinks>
 port vlan 100 to 300 0/9 0
#
[gpon]
  <gpon-0/1>
 interface gpon 0/1
 port 0 ont-auto-find enable
 port dba bandwidth-assignment-mode 0 max-bandwidth-usage
 port 1 ont-auto-find enable
 port dba bandwidth-assignment-mode 1 max-bandwidth-usage
#
[ont]
  <ont>
 ont add 1 0 sn-auth "HWTC11111111" omci ont-lineprofile-id 10 ont-srvprofile-id 1
 ont add 1 1 sn-auth "HWTC22222222" omci ont-lineprofile-id 10 ont-srvprofile-id 1
#
[service-port]
  <service-port>
 service-port 1 vlan 100 gpon 0/1/0 ont 0 gemport 1 multi-service user-vlan 100
 service-port 2 vlan 100 gpon 0/1/1 ont 1 gemport 1 multi-service user-vlan 100
#
