!<mim>
!<system-config>
hostname OLT-ZTE-LAB
!</system-config>
!<if-intf>
interface gei-1/1/5
  description UPLINK
  no shutdown
$
interface xgei-1/1/1
  description UPLINK-10G
  no shutdown
$
interface gpon_olt-1/3/1
$
interface gpon_olt-1/3/2
$
interface gpon_onu-1/3/1:1
$
interface gpon_onu-1/3/1:2
$
!</if-intf>
interface gpon 1/3/1
 onu 1
  serial-number ZTEGD70EF916
  service-profile SP-PPPOE line-profile LP-PPPOE
  ethernet 1
   negotiation
   no shutdown
   native vlan vlan-id 200
  !
 !
!
interface gpon 1/3/1
 onu 2
  serial-number ZTEGD70EF917
  service-profile SP-PPPOE line-profile LP-PPPOE
  ethernet 1
   no shutdown
   native vlan vlan-id 100
  !
 !
!
service-port 1 gpon 1/3/1 onu 1 gem 1 match vlan vlan-id 200 action vlan replace vlan-id 200
service-port 2 gpon 1/3/1 onu 2 gem 1 match vlan vlan-id 100 action vlan replace vlan-id 100
